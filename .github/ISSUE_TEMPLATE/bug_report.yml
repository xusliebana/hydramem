name: Bug report
description: Report something that is broken or behaves unexpectedly
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!
        Please fill in as much detail as possible — short, reproducible reports are reviewed first.

  - type: input
    id: version
    attributes:
      label: HydraMem version
      placeholder: "0.2.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12.3"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Ubuntu 24.04 / macOS 14.5 / ..."
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: How to reproduce
      description: Step-by-step instructions or a minimal code snippet.
      placeholder: |
        1. `uv sync`
        2. `uv run hydramem-server`
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / stack trace
      render: shell

  - type: dropdown
    id: backend
    attributes:
      label: Backend
      options:
        - LadybugDB / Kuzu
        - NetworkX (in-memory fallback)
        - I don't know
    validations:
      required: true
